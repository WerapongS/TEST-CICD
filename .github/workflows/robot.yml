name: Run Robot to Microsoft Teams

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  run-robot-framework-tests:
    name: Run Robot Framework Tests
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install robotframework

      - name: Run test.robot
        run: robot --outputdir results --output output.xml --log log.html --report report.html test.robot

      - name: Send Teams Notification
        if: always()
        shell: python
        run: |
          import urllib.request
          import json

          status  = "${{ job.status }}"
          repo    = "${{ github.repository }}"
          branch  = "${{ github.ref_name }}"
          actor   = "${{ github.actor }}"
          run_url = "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          icon    = "OK" if status == "success" else "FAIL"
          color   = "00FF00" if status == "success" else "FF0000"

          payload = {
            "@type": "MessageCard",
            "@context": "http://schema.org/extensions",
            "themeColor": color,
            "summary": "Robot Framework Test Results",
            "sections": [{
              "activityTitle": "Robot Framework - Hello World Test",
              "activitySubtitle": "Repository: " + repo,
              "facts": [
                { "name": "Status",       "value": icon + " " + status.capitalize() },
                { "name": "Branch",       "value": branch },
                { "name": "Triggered by", "value": actor }
              ]
            }],
            "potentialAction": [{
              "@type": "OpenUri",
              "name": "View Run",
              "targets": [{ "os": "default", "uri": run_url }]
            }]
          }

          data = json.dumps(payload).encode("utf-8")
          req  = urllib.request.Request(
            "${{ secrets.TEAMS_WEBHOOK_URL }}",
            data=data,
            headers={"Content-Type": "application/json"}
          )
          urllib.request.urlopen(req)

      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: robot-results
          path: results/