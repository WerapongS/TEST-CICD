name: Run Robot to Microsoft Teams

on:
  push:
    branches: [ main]
  pull_request:
    branches: [ main ]

jobs:
  run-robot-framework-tests:
    name: Run Robot Framework Tests
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install robotframework

      - name: Run test.robot
        run: robot --outputdir results --output output.xml --log log.html --report report.html test.robot

      - name: Parse Robot Results
        if: always()
        id: parse
        shell: python
        run: |
          import xml.etree.ElementTree as ET
          import os

          try:
            tree   = ET.parse("results/output.xml")
            root   = tree.getroot()
            stats  = root.find(".//total/stat")
            passed = stats.get("pass", "0")
            failed = stats.get("fail", "0")
            total  = str(int(passed) + int(failed))
          except:
            passed = "0"
            failed = "0"
            total  = "0"

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
            f.write("passed=" + passed + "\n")
            f.write("failed=" + failed + "\n")
            f.write("total="  + total  + "\n")

      - name: Send Teams Notification
        if: always()
        shell: python
        env:
          TEAMS_URL:  ${{ secrets.TEAMS_WEBHOOK_URL }}
          JOB_STATUS: ${{ job.status }}
          REPO:       ${{ github.repository }}
          BRANCH:     ${{ github.ref_name }}
          ACTOR:      ${{ github.actor }}
          RUN_ID:     ${{ github.run_id }}
          SERVER_URL: ${{ github.server_url }}
          PASSED:     ${{ steps.parse.outputs.passed }}
          FAILED:     ${{ steps.parse.outputs.failed }}
          TOTAL:      ${{ steps.parse.outputs.total }}
        run: |
          import urllib.request
          import json
          import os

          status    = os.environ["JOB_STATUS"]
          repo      = os.environ["REPO"]
          branch    = os.environ["BRANCH"]
          actor     = os.environ["ACTOR"]
          run_url   = os.environ["SERVER_URL"] + "/" + repo + "/actions/runs/" + os.environ["RUN_ID"]
          teams_url = os.environ["TEAMS_URL"]
          passed    = os.environ.get("PASSED", "0")
          failed    = os.environ.get("FAILED", "0")
          total     = os.environ.get("TOTAL",  "0")

          is_success   = status == "success"
          theme_color  = "2DC653" if is_success else "E8284A"
          status_badge = "\u2705  PASSED" if is_success else "\u274C  FAILED"
          footer_text  = "\U0001F389  All tests passed successfully!" if is_success else "\U0001F6A8  Some tests failed! Please check the logs."

          passed_display = "\u2705  " + passed
          failed_display = ("\u274C  " + failed) if int(failed) > 0 else "\u2796  " + failed

          payload = {
            "@type": "MessageCard",
            "@context": "http://schema.org/extensions",
            "themeColor": theme_color,
            "summary": "Robot Framework Test Results",
            "sections": [
              {
                "activityTitle": "Robot Framework Test Results",
                "activitySubtitle": "**" + repo + "** | Branch: `" + branch + "`",
                "facts": [
                  { "name": "Result",       "value": "**" + status_badge + "**" },
                  { "name": "Total Tests",  "value": "**" + total + "**" },
                  { "name": "Passed",       "value": passed_display },
                  { "name": "Failed",       "value": failed_display },
                  { "name": "Branch",       "value": "`" + branch + "`" },
                  { "name": "Triggered by", "value": actor }
                ],
                "markdown": True
              },
              {
                "text": "**" + footer_text + "**"
              }
            ],
            "potentialAction": [
              {
                "@type": "OpenUri",
                "name": "View Run Details",
                "targets": [{ "os": "default", "uri": run_url }]
              },
              {
                "@type": "OpenUri",
                "name": "View Repository",
                "targets": [{ "os": "default", "uri": "https://github.com/" + repo }]
              }
            ]
          }

          data = json.dumps(payload).encode("utf-8")
          req  = urllib.request.Request(
            teams_url,
            data=data,
            headers={"Content-Type": "application/json"}
          )
          urllib.request.urlopen(req)

      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: robot-results
          path: results/